<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>svg-terminal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      font-family: 'DejaVu Sans Mono', 'Fira Code', Consolas, monospace;
      padding: 16px;
      padding-bottom: 56px;
    }
    h1 {
      color: #666;
      font-size: 14px;
      font-weight: normal;
      margin-bottom: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 12px;
    }
    .terminal-card {
      background: #1c1c1c;
      border-radius: 6px;
      overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .terminal-card:hover {
      border-color: #333;
    }
    .terminal-card.selected {
      border-color: #5c5cff;
    }
    .terminal-card header {
      padding: 6px 12px;
      color: #888;
      font-size: 12px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    .terminal-card header .session-name {
      color: #aaa;
    }
    .terminal-card header .status {
      color: #555;
      font-size: 10px;
    }
    .terminal-card object {
      width: 100%;
      display: block;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h1>svg-terminal</h1>
  <div class="grid" id="grid"></div>

  <script>
    // Session card management
    var grid = document.getElementById('grid');
    var cards = new Map(); // session name → card element
    var selectedSession = null;

    function createCard(session) {
      var card = document.createElement('div');
      card.className = 'terminal-card';
      card.dataset.session = session.name;

      var hdr = document.createElement('header');
      var nameEl = document.createElement('span');
      nameEl.className = 'session-name';
      nameEl.textContent = session.name;
      var statusEl = document.createElement('span');
      statusEl.className = 'status';
      statusEl.textContent = session.windows + ' window' + (session.windows !== 1 ? 's' : '');
      hdr.appendChild(nameEl);
      hdr.appendChild(statusEl);
      card.appendChild(hdr);

      var obj = document.createElement('object');
      obj.type = 'image/svg+xml';
      obj.data = '/terminal.svg?session=' + encodeURIComponent(session.name);
      card.appendChild(obj);

      card.addEventListener('click', function () { selectCard(session.name); });

      grid.appendChild(card);
      cards.set(session.name, card);
    }

    function removeCard(name) {
      var card = cards.get(name);
      if (card) {
        card.remove();
        cards.delete(name);
        if (selectedSession === name) selectedSession = null;
      }
    }

    function selectCard(name) {
      // Deselect previous
      if (selectedSession) {
        var prev = cards.get(selectedSession);
        if (prev) prev.classList.remove('selected');
      }
      // Toggle or select new
      if (selectedSession === name) {
        selectedSession = null;
      } else {
        selectedSession = name;
        var card = cards.get(name);
        if (card) card.classList.add('selected');
      }
    }

    // Session discovery
    async function refreshSessions() {
      try {
        var res = await fetch('/api/sessions');
        if (!res.ok) return;
        var sessions = await res.json();
        var currentNames = new Set(sessions.map(function (s) { return s.name; }));
        var existingNames = new Set(cards.keys());

        // Add new sessions
        for (var i = 0; i < sessions.length; i++) {
          if (!existingNames.has(sessions[i].name)) {
            createCard(sessions[i]);
          }
        }

        // Remove dead sessions
        existingNames.forEach(function (name) {
          if (!currentNames.has(name)) {
            removeCard(name);
          }
        });
      } catch (e) {
        // Server unreachable — leave cards as-is
      }
    }

    // Initial load
    refreshSessions();

    // Poll for session changes every 5 seconds
    setInterval(refreshSessions, 5000);

    // Keyboard navigation
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        var names = Array.from(cards.keys());
        if (names.length === 0) return;
        var idx = selectedSession ? names.indexOf(selectedSession) : -1;
        var next = e.shiftKey
          ? (idx <= 0 ? names.length - 1 : idx - 1)
          : (idx + 1) % names.length;
        selectCard(names[next]);
      }
    });
  </script>
</body>
</html>
