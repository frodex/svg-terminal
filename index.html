<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>svg-terminal</title>
  <link rel="stylesheet" href="/dashboard.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.min.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- Top menu bar: session + layout (multi-focus) + identity -->
  <nav class="top-bar" id="top-bar" aria-label="Main menu">
    <div class="top-bar-section">
      <button type="button" class="top-bar-hamburger" id="top-menu-hamburger" title="Menu">☰</button>
      <div class="main-menu-dropdown" id="main-menu-dropdown" role="menu">
        <a href="#" class="main-menu-item" id="menu-new-session" role="menuitem">New session…</a>
        <a href="#" class="main-menu-item" id="menu-restart" role="menuitem">Restart session…</a>
        <a href="#" class="main-menu-item" id="menu-fork" role="menuitem">Fork session…</a>
        <span class="main-menu-sep"></span>
        <a href="#" class="main-menu-item" id="menu-help" role="menuitem">Help</a>
        <a href="/login" class="main-menu-item" id="menu-login" role="menuitem">Login</a>
        <button type="button" class="main-menu-item main-menu-item--btn" id="menu-logout" role="menuitem">Log out</button>
      </div>
    </div>
    <div class="top-bar-section top-bar-multi" id="top-bar-multi">
      <div class="layout-selector-wrap">
        <button type="button" class="layout-selector-btn" id="layout-selector-btn" title="Choose layout">
          <span class="layout-label-prefix">Layout:</span>
          <span id="layout-current-label">Auto</span>
          <span class="layout-caret">▾</span>
        </button>
        <div class="layout-dropdown" id="layout-dropdown" role="listbox">
          <button type="button" class="layout-option" data-layout-key="auto" role="option">Auto</button>
          <button type="button" class="layout-option" data-layout-key="2up-h" role="option">2-Up Horizontal</button>
          <button type="button" class="layout-option" data-layout-key="2up-v" role="option">2-Up Vertical</button>
          <button type="button" class="layout-option" data-layout-key="1main-2side" role="option">1 Main + 2 Side</button>
          <button type="button" class="layout-option" data-layout-key="3col" role="option">3 Columns</button>
          <button type="button" class="layout-option" data-layout-key="2x2" role="option">2×2 Grid</button>
          <button type="button" class="layout-option" data-layout-key="2top-1bottom" role="option">2 Top + 1 Bottom</button>
          <button type="button" class="layout-option" data-layout-key="1main-4mini" role="option">1 Main + 4 Mini</button>
          <button type="button" class="layout-option" data-layout-key="n-stacked" role="option">Stacked Rows</button>
        </div>
      </div>
      <button type="button" class="top-bar-action" id="top-fit-all" title="Fit terminal to card for all focused">⊡ Fit all</button>
      <button type="button" class="top-bar-action" id="top-max-all" title="Maximize each card to its layout slot">⬜ Max all</button>
    </div>
    <div class="top-bar-section top-bar-section--right">
      <span class="user-pill" id="top-user-pill" title="">…</span>
    </div>
  </nav>

  <!-- Ghost layout preview (multi-focus layout hover) -->
  <div class="ghost-layout-preview" id="ghost-layout-preview" aria-hidden="true"></div>

  <!-- Thumbnail sidebar -->
  <div class="thumbnail-sidebar" id="sidebar"></div>

  <!-- Focus overlay: native DOM rendering for pixel-perfect focused terminal -->
  <div class="focus-overlay" id="focus-overlay"></div>

  <!-- Help button + panel -->
  <button class="help-btn" id="help-btn" title="Controls (?)">?</button>
  <div class="help-panel" id="help-panel">
    <div class="help-panel-inner">
      <div class="help-header">
        <span>Controls</span>
        <button class="help-close" id="help-close">&times;</button>
      </div>
      <div class="help-controls">
        <!-- Auto-populated from KEYBINDINGS config in dashboard.mjs -->
      </div>
    </div>
  </div>

  <!-- New session form — fields aligned with claude-proxy session-form.yaml + launch profiles (shell / claude / cursor) -->
  <div class="session-form-panel" id="session-form-panel" aria-hidden="true">
    <div class="session-form-backdrop" id="session-form-backdrop"></div>
    <div class="session-form-dialog" role="dialog" aria-labelledby="session-form-title">
      <div class="session-form-header">
        <h2 id="session-form-title">New session</h2>
        <button type="button" class="session-form-close" id="session-form-close" title="Close">&times;</button>
      </div>
      <p class="session-form-sub">Same options as the claude-proxy TUI session form. <span class="req">*</span> = required.</p>

      <div class="session-form-section">
        <div class="section-label">Session kind</div>
        <div class="launch-profile-pick" id="sf-profiles" role="radiogroup" aria-label="Launch profile">
          <label class="profile-pill"><input type="radio" name="sf-profile" value="shell" /> <span>New terminal</span> <span class="key-hint">[t]</span></label>
          <label class="profile-pill"><input type="radio" name="sf-profile" value="claude" checked /> <span>New Claude session</span> <span class="key-hint">[n]</span></label>
          <label class="profile-pill"><input type="radio" name="sf-profile" value="cursor" /> <span>New Cursor session</span> <span class="key-hint">[c]</span></label>
        </div>
      </div>

      <div class="session-form-section">
        <label class="field-label" for="sf-name">Session name <span class="req">*</span></label>
        <input type="text" class="field-input" id="sf-name" placeholder="my-project" autocomplete="off" />
      </div>

      <div class="session-form-row sf-admin-only" id="sf-runas-row" hidden>
        <label class="field-label" for="sf-runas">Run as user</label>
        <input type="text" class="field-input" id="sf-runas" placeholder="linux account" />
      </div>

      <div class="session-form-row sf-admin-remotes" id="sf-remote-row" hidden>
        <label class="field-label" for="sf-remote">Remote host</label>
        <select class="field-input" id="sf-remote"><option value="">local</option></select>
      </div>

      <div class="session-form-section">
        <label class="field-label" for="sf-workdir">Working directory</label>
        <input type="text" class="field-input" id="sf-workdir" placeholder="~ or /path/to/project" />
      </div>

      <div class="checkbox-row" id="sf-flags-row">
        <label><input type="checkbox" id="sf-hidden" /> Hidden session</label>
        <label><input type="checkbox" id="sf-viewonly" /> View-only</label>
        <label><input type="checkbox" id="sf-public" checked /> Public session</label>
      </div>

      <div class="session-form-section sf-access-row" id="sf-access-row" hidden>
        <div class="section-label">Access <span class="note">(private, not hidden)</span></div>
        <div class="session-form-row">
          <div>
            <label class="field-label" for="sf-users">Allowed users</label>
            <select class="field-input field-multiselect" id="sf-users" multiple size="4"></select>
          </div>
          <div>
            <label class="field-label" for="sf-groups">Allowed groups</label>
            <select class="field-input field-multiselect" id="sf-groups" multiple size="4"></select>
          </div>
        </div>
      </div>

      <div class="session-form-row">
        <div>
          <label class="field-label" for="sf-password">Password</label>
          <input type="password" class="field-input" id="sf-password" placeholder="Optional" autocomplete="new-password" />
        </div>
        <div class="sf-claude-admin" id="sf-danger-row" hidden>
          <label class="field-label">Skip permissions <span class="note">(admin, Claude)</span></label>
          <label class="inline-check"><input type="checkbox" id="sf-dangermode" /> Enable <code>--dangerously-skip-permissions</code></label>
        </div>
      </div>

      <div class="session-form-section sf-claude-only" id="sf-resume-row">
        <label class="inline-check"><input type="checkbox" id="sf-resume" /> Resume Claude session</label>
        <label class="field-label" for="sf-claude-id">Claude session ID</label>
        <input type="text" class="field-input" id="sf-claude-id" placeholder="UUID when resuming" disabled />
      </div>

      <div class="session-form-actions">
        <button type="button" class="btn-session-primary" id="session-form-submit">Create session</button>
        <button type="button" class="btn-session-outline" id="session-form-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Input status bar (keystrokes captured at document level) -->
  <div class="input-bar" id="input-bar">
    <span class="status-dot" id="ws-status"></span>
    <span class="target" id="input-target"></span>
    <span class="input-hint">Keys go to terminal</span>
    <span class="perf-indicator" id="perf-indicator" title="Performance mode (click to cycle)"></span>
  </div>


  <script type="module" src="/dashboard.mjs"></script>
</body>
</html>
