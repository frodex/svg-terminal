<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Claude Proxy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: system-ui, sans-serif;
           display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #16213e; border-radius: 12px; padding: 48px; max-width: 400px; width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    h1 { font-size: 1.5rem; margin-bottom: 8px; color: #fff; }
    p { color: #999; margin-bottom: 32px; font-size: 0.9rem; }
    .btn { display: block; width: 100%; padding: 14px; margin-bottom: 12px; border: none;
           border-radius: 8px; font-size: 1rem; cursor: pointer; text-align: center;
           text-decoration: none; color: #fff; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-google { background: #4285f4; }
    .btn-github { background: #333; }
    .btn-microsoft { background: #00a4ef; }
    .error { background: #3d1515; color: #ff6b6b; padding: 12px; border-radius: 8px;
             margin-bottom: 16px; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Claude Proxy</h1>
    <p>Sign in to access terminal sessions</p>
    <div id="error" class="error" style="display:none"></div>
    <a class="btn btn-google" href="/auth/google">Sign in with Google</a>
    <a class="btn btn-github" href="/auth/github">Sign in with GitHub</a>
    <a class="btn btn-microsoft" href="/auth/microsoft">Sign in with Microsoft</a>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const err = params.get('error');
    if (err) {
      const el = document.getElementById('error');
      // Limit length and strip any HTML tags as defense-in-depth (textContent already prevents XSS)
      el.textContent = err.replace(/<[^>]*>/g, '').slice(0, 200);
      el.style.display = 'block';
    }

    // Dev mode: show password form if no OAuth providers are configured
    (function() {
      var btns = document.querySelectorAll('.provider-btn, .oauth-btn, .btn-google, .btn-github, .btn-microsoft');
      var hasVisibleBtn = false;
      for (var i = 0; i < btns.length; i++) {
        if (btns[i].offsetParent !== null) hasVisibleBtn = true;
      }
      if (!hasVisibleBtn) {
        var card = document.querySelector('.card') || document.querySelector('.login-card') || document.body;
        var devDiv = document.createElement('div');
        devDiv.style.marginTop = '20px';
        devDiv.style.textAlign = 'center';
        devDiv.innerHTML = '<h3 style="color:#fff;margin-bottom:12px">Development Mode</h3>' +
          '<input type="password" id="dev-password" placeholder="Dev password" style="background:#1a1a2e;color:#e0e0e0;border:1px solid #333;border-radius:4px;padding:8px 12px;font-size:0.9rem;width:200px;text-align:center">' +
          '<br><button onclick="devLogin()" style="margin-top:12px;padding:8px 20px;background:#4285f4;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:0.9rem">Sign in</button>' +
          '<p id="dev-error" style="color:#f44;font-size:0.8rem;margin-top:8px;display:none"></p>';
        card.appendChild(devDiv);
      }
    })();

    function devLogin() {
      var pw = document.getElementById('dev-password');
      if (!pw) return;
      fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw.value })
      }).then(function(r) {
        if (r.ok) { location.href = '/'; }
        else {
          var err = document.getElementById('dev-error');
          if (err) { err.textContent = 'Invalid password'; err.style.display = 'block'; }
        }
      }).catch(function() {
        var err = document.getElementById('dev-error');
        if (err) { err.textContent = 'Connection error'; err.style.display = 'block'; }
      });
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && document.getElementById('dev-password') === document.activeElement) {
        devLogin();
      }
    });
  </script>
</body>
</html>
