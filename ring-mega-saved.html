<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: linear-gradient(180deg, #f8f8fa 0%, #e8e6e2 100%); min-height: 100vh; font-family: -apple-system, sans-serif; overflow: hidden; }

.ring-container { position: absolute; pointer-events: none; overflow: visible; transform-style: preserve-3d; }
.ring-container .card { pointer-events: auto; }
.ring-wire { position: absolute; border: 1px solid rgba(0,0,0,0.07); border-radius: 50%; pointer-events: none; left: 0; top: 0; }
.center-mark { position: absolute; width: 6px; height: 6px; border-radius: 50%; background: rgba(0,0,0,0.08); pointer-events: none; }

.card { position: absolute; background: #1c1c1e; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); font-family: 'Courier New', monospace; font-size: 9px; color: #aaa; overflow: hidden; }
.card.inner { box-shadow: 0 14px 40px rgba(0,0,0,0.35); }
.card .chrome { display: flex; align-items: center; gap: 3px; padding: 4px 6px; background: #2a2a2c; }
.card .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.card .r { background: #ff5f57; } .card .y { background: #febc2e; } .card .g { background: #28c840; }
.card .nm { color: #666; font-size: 7px; margin-left: 3px; }
.card .body { padding: 4px 6px; line-height: 1.4; }
.card .pr { color: #0f0; }

/* Panel */
.panel { position: fixed; right: 12px; top: 12px; bottom: 12px; background: rgba(0,0,0,0.75); backdrop-filter: blur(12px); border-radius: 12px; padding: 0; z-index: 100; color: #ccc; font-size: 11px; width: 260px; overflow-y: auto; overflow-x: hidden; }
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
.panel .section { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.panel h3 { color: #fff; font-size: 11px; font-weight: 600; margin-bottom: 6px; }
.panel label { display: block; margin-bottom: 2px; color: #888; font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; }
.panel .row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.panel .pair { display: flex; gap: 6px; margin-bottom: 4px; }
.panel .pair > div { flex: 1; }
.panel .pair label { font-size: 8px; margin-bottom: 1px; }
.panel input[type=range] { width: 100%; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.12); border-radius: 2px; outline: none; }
.panel input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #5c5cff; cursor: pointer; }
.panel .val { min-width: 28px; text-align: right; color: #777; font-family: monospace; font-size: 10px; }
.panel select { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.12); color: #ddd; padding: 2px 4px; border-radius: 4px; font-size: 10px; width: 100%; }
.panel .btns { display: flex; gap: 3px; }
.panel .btns button { flex: 1; padding: 3px; border: none; border-radius: 3px; background: rgba(255,255,255,0.08); color: #999; font-size: 10px; cursor: pointer; }
.panel .btns button:hover { background: rgba(255,255,255,0.15); }
.panel .btns button.active { background: #5c5cff; color: #fff; }
.panel .osc-row { display: flex; align-items: center; gap: 4px; margin-top: 2px; }
.panel .osc-row label { font-size: 8px; margin: 0; color: #666; }
.panel .osc-row input[type=range] { flex: 1; }
.panel .lock-btn { width: 18px; height: 18px; border: none; border-radius: 3px; background: rgba(255,255,255,0.08); color: #555; font-size: 10px; cursor: pointer; padding: 0; line-height: 18px; text-align: center; flex-shrink: 0; }
.panel .lock-btn:hover { background: rgba(255,255,255,0.15); }
.panel .lock-btn.locked { background: #5c5cff; color: #fff; }
</style>
</head>

<script>
// === State ===
var OUTER_W = 130, OUTER_H = 90, INNER_W = 160, INNER_H = 110;
var cx, cy;
var outerAngle = 0, innerAngle = 0;
var spins = { o: 1, i: -1 };
var outerSpeed = 0.008, innerSpeed = 0.012;
var planeTime = 0;
var outerCards = [], innerCards = [];
var outerContainer, innerContainer;

var outerNames = ['w-01','w-02','w-03','w-04','w-05','w-06','w-07','w-08','w-09','w-10','w-11','w-12'];
var innerNames = ['primary','manager','ctrl-01','ctrl-02','ctrl-03','ctrl-04','ctrl-05','ctrl-06'];
var outerTexts = ['❯ build\ncompile','testing\n14/22','deploy\n████░░','watching\nidle','❯ logs','lint\npass','format\ndone','bench\n2.3ms','scan\nclean','pack\n98KB','serve\n:3200','audit\nok'];
var innerTexts = ['❯ claude\nthinking\n⠸ work','dispatch\n3 active','monitor\nall ok','backup\nrunning','sync\npending','cache\nwarm','queue\nempty','health\n✓ ok'];

// === Helpers ===
function $(id) { return document.getElementById(id); }
function N(id) { return parseFloat($(id).value); }

// Lock state
var locks = {};

function toggleLock(prefix) {
  locks[prefix] = !locks[prefix];
  var btn = $(prefix + 'L');
  btn.classList.toggle('locked', locks[prefix]);
  btn.textContent = locks[prefix] ? '🔒' : '🔓';
  if (locks[prefix]) {
    // Snap: copy From value to To
    $(prefix + '2').value = $(prefix + '1').value;
    V();
  }
}

function sync(prefix, fromTo) {
  if (!locks[prefix]) return;
  if (fromTo) {
    $(prefix + '1').value = $(prefix + '2').value;
  } else {
    $(prefix + '2').value = $(prefix + '1').value;
  }
}

// Face camera toggle
var faceCamera = { o: false, i: false };

function toggleFace(ring) {
  faceCamera[ring] = !faceCamera[ring];
  var btn = $(ring + 'Face');
  btn.textContent = 'Face Camera: ' + (faceCamera[ring] ? 'ON' : 'OFF');
  btn.classList.toggle('active', faceCamera[ring]);
}

// Update all value displays
function V() {
  var ids = ['oCount','oRadius','iCount','iRadius',
    'oRTX1','oRTX2','oRTXS','oRTY1','oRTY2','oRTYS','oRTZ1','oRTZ2','oRTZS',
    'oCTX1','oCTX2','oCTXS','oCTY1','oCTY2','oCTYS','oCTZ1','oCTZ2','oCTZS',
    'iRTX1','iRTX2','iRTXS','iRTY1','iRTY2','iRTYS','iRTZ1','iRTZ2','iRTZS',
    'iCTX1','iCTX2','iCTXS','iCTY1','iCTY2','iCTYS','iCTZ1','iCTZ2','iCTZS',
    'camZoom','camPush','camPanX','camPanY'];
  ids.forEach(function(id) { $(id + 'V').textContent = $(id).value; });
}

// Oscillate between from/to at speed
function osc(from, to, speed, time) {
  if (speed === 0) return from;
  var t = (Math.sin(time * speed * 0.05) + 1) / 2; // 0 to 1
  return from + (to - from) * t;
}

function makeCard(name, text, isInner) {
  var el = document.createElement('div');
  el.className = 'card' + (isInner ? ' inner' : '');
  el.style.width = (isInner ? INNER_W : OUTER_W) + 'px';
  el.style.height = (isInner ? INNER_H : OUTER_H) + 'px';
  el.innerHTML =
    '<div class="chrome"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>' +
    '<span class="nm">' + name + '</span></div>' +
    '<div class="body">' + text.replace(/\n/g,'<br>').replace(/❯/g,'<span class="pr">❯</span>') + '</div>';
  return el;
}

function rebuildOuter() {
  var n = parseInt($('oCount').value);
  $('oCountV').textContent = n;
  outerCards.forEach(function(el) { el.remove(); });
  outerCards = [];
  for (var i = 0; i < n; i++) {
    var el = makeCard(outerNames[i], outerTexts[i], false);
    outerContainer.appendChild(el);
    outerCards.push(el);
  }
}

function rebuildInner() {
  var n = parseInt($('iCount').value);
  $('iCountV').textContent = n;
  innerCards.forEach(function(el) { el.remove(); });
  innerCards = [];
  for (var i = 0; i < n; i++) {
    var el = makeCard(innerNames[i], innerTexts[i], true);
    innerContainer.appendChild(el);
    innerCards.push(el);
  }
}

function setSpin(ring, val) {
  spins[ring] = val;
  $(ring + 'SpinN').classList.toggle('active', val === -1);
  $(ring + 'Spin0').classList.toggle('active', val === 0);
  $(ring + 'SpinP').classList.toggle('active', val === 1);
}

// === Positioning (real 3D) ===
// Cards are positioned in 2D on the circle, ring tilt is handled by the container's 3D transform
function positionCard(el, theta, ringAngle, radius, w, h, mode, ctx, cty, ctz, rtx, rty, rtz, faceCam) {
  var spunTheta = theta + ringAngle;

  // Position on the flat circle (container handles the 3D tilt)
  var px = radius + Math.cos(spunTheta) * radius;
  var py = radius + Math.sin(spunTheta) * radius;

  // Float
  var fx = 0, fy = 0;
  if (mode !== 1) {
    fx = Math.sin(planeTime * 0.4 + theta * 3) * 3;
    fy = Math.cos(planeTime * 0.35 + theta * 2) * 4;
  }

  // Card rotation (mode)
  var rotDeg = 0;
  switch (mode) {
    case 0: rotDeg = 0; break;
    case 1:
      rotDeg = (theta - Math.PI / 2 + ringAngle) * 180 / Math.PI;
      break;
    case 2:
      rotDeg = (theta - Math.PI / 2 + ringAngle) * 0.3 * 180 / Math.PI;
      break;
    case 4:
      rotDeg = ringAngle * 180 / Math.PI;
      break;
  }

  // Card tilt: applied uniformly to all cards
  var cardTilt = '';
  if (ctx !== 0 || cty !== 0 || ctz !== 0) {
    cardTilt = ' rotateX(' + ctx + 'deg) rotateY(' + cty + 'deg) rotateZ(' + ctz + 'deg)';
  }

  // Face camera: counter-rotate by the ring's tilt so card always faces viewer
  var faceTransform = '';
  if (faceCam) {
    // Reverse the container's rotation on each card
    // Apply in reverse order: Z, Y, X (opposite of container's X, Y, Z)
    faceTransform = ' rotateZ(' + (-rtz) + 'deg) rotateY(' + (-rty) + 'deg) rotateX(' + (-rtx) + 'deg)';
  }

  el.style.left = (px - w / 2 + fx) + 'px';
  el.style.top = (py - h / 2 + fy) + 'px';
  el.style.transformOrigin = '50% 50%';
  el.style.transform = 'rotate(' + rotDeg + 'deg)' + faceTransform + cardTilt;
}

// === Layout ===
function layout() {
  cx = window.innerWidth / 2 - 130;
  cy = window.innerHeight / 2;
  var oR = N('oRadius'), iR = N('iRadius');

  outerContainer.style.width = (oR * 2) + 'px';
  outerContainer.style.height = (oR * 2) + 'px';
  outerContainer.style.left = (cx - oR) + 'px';
  outerContainer.style.top = (cy - oR) + 'px';

  innerContainer.style.width = (iR * 2) + 'px';
  innerContainer.style.height = (iR * 2) + 'px';
  innerContainer.style.left = (cx - iR) + 'px';
  innerContainer.style.top = (cy - iR) + 'px';

  $('centerMark').style.left = (cx - 3) + 'px';
  $('centerMark').style.top = (cy - 3) + 'px';
}

// === Animate ===
function animate() {
  requestAnimationFrame(animate);
  outerAngle += outerSpeed * spins.o;
  innerAngle += innerSpeed * spins.i;
  planeTime += 0.016;

  var oR = N('oRadius'), iR = N('iRadius');
  var oMode = parseInt($('oMode').value);
  var iMode = parseInt($('iMode').value);

  // Oscillating ring tilts (outer)
  var oRTX = osc(N('oRTX1'), N('oRTX2'), N('oRTXS'), planeTime);
  var oRTY = osc(N('oRTY1'), N('oRTY2'), N('oRTYS'), planeTime);
  var oRTZ = osc(N('oRTZ1'), N('oRTZ2'), N('oRTZS'), planeTime);
  // Oscillating card tilts (outer)
  var oCTX = osc(N('oCTX1'), N('oCTX2'), N('oCTXS'), planeTime);
  var oCTY = osc(N('oCTY1'), N('oCTY2'), N('oCTYS'), planeTime);
  var oCTZ = osc(N('oCTZ1'), N('oCTZ2'), N('oCTZS'), planeTime);

  // Oscillating ring tilts (inner)
  var iRTX = osc(N('iRTX1'), N('iRTX2'), N('iRTXS'), planeTime);
  var iRTY = osc(N('iRTY1'), N('iRTY2'), N('iRTYS'), planeTime);
  var iRTZ = osc(N('iRTZ1'), N('iRTZ2'), N('iRTZS'), planeTime);
  // Oscillating card tilts (inner)
  var iCTX = osc(N('iCTX1'), N('iCTX2'), N('iCTXS'), planeTime);
  var iCTY = osc(N('iCTY1'), N('iCTY2'), N('iCTYS'), planeTime);
  var iCTZ = osc(N('iCTZ1'), N('iCTZ2'), N('iCTZS'), planeTime);

  // Ring tilt: applied to the CONTAINER (real 3D via preserve-3d)
  // Cards inside inherit the 3D transform — no faking
  outerContainer.style.width = (oR * 2) + 'px';
  outerContainer.style.height = (oR * 2) + 'px';
  outerContainer.style.left = (cx - oR) + 'px';
  outerContainer.style.top = (cy - oR) + 'px';
  outerContainer.style.transform = 'rotateX(' + oRTX + 'deg) rotateY(' + oRTY + 'deg) rotateZ(' + oRTZ + 'deg)';

  innerContainer.style.width = (iR * 2) + 'px';
  innerContainer.style.height = (iR * 2) + 'px';
  innerContainer.style.left = (cx - iR) + 'px';
  innerContainer.style.top = (cy - iR) + 'px';
  innerContainer.style.transform = 'rotateX(' + iRTX + 'deg) rotateY(' + iRTY + 'deg) rotateZ(' + iRTZ + 'deg)';

  // Wireframe rings: match the container tilt but as a visual circle
  var outerWire = outerContainer.querySelector('.ring-wire');
  if (outerWire) outerWire.style.transform = 'none'; // container handles tilt
  var innerWire = innerContainer.querySelector('.ring-wire');
  if (innerWire) innerWire.style.transform = 'none';

  // Position cards (2D on the circle — container does the 3D)
  for (var i = 0; i < outerCards.length; i++) {
    var theta = -Math.PI / 2 + (2 * Math.PI * i) / outerCards.length;
    positionCard(outerCards[i], theta, outerAngle, oR, OUTER_W, OUTER_H, oMode, oCTX, oCTY, oCTZ, oRTX, oRTY, oRTZ, faceCamera.o);
  }
  for (var i = 0; i < innerCards.length; i++) {
    var theta = -Math.PI / 2 + (2 * Math.PI * i) / innerCards.length;
    positionCard(innerCards[i], theta, innerAngle, iR, INNER_W, INNER_H, iMode, iCTX, iCTY, iCTZ, iRTX, iRTY, iRTZ, faceCamera.i);
  }

  // Camera: zoom + push (translateZ into the 3D scene) + pan
  var camZoom = N('camZoom') / 100;
  var camPush = N('camPush');
  var camPanX = N('camPanX');
  var camPanY = N('camPanY');
  sceneWrap.style.transform = 'perspective(800px) translate3d(' + camPanX + 'px, ' + camPanY + 'px, ' + camPush + 'px) scale(' + camZoom.toFixed(3) + ')';
}

// === Init ===
// Scene wrapper for camera transforms
var sceneWrap = document.createElement('div');
sceneWrap.id = 'sceneWrap';
sceneWrap.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;transform-origin:center center;transform-style:preserve-3d;';
document.body.appendChild(sceneWrap);

outerContainer = document.createElement('div');
outerContainer.className = 'ring-container';
var ow = document.createElement('div'); ow.className = 'ring-wire'; ow.style.width = '100%'; ow.style.height = '100%';
outerContainer.appendChild(ow);
sceneWrap.appendChild(outerContainer);

innerContainer = document.createElement('div');
innerContainer.className = 'ring-container';
var iw = document.createElement('div'); iw.className = 'ring-wire'; iw.style.width = '100%'; iw.style.height = '100%';
innerContainer.appendChild(iw);
sceneWrap.appendChild(innerContainer);

var cm = document.createElement('div'); cm.className = 'center-mark'; cm.id = 'centerMark';
sceneWrap.appendChild(cm);

rebuildOuter();
rebuildInner();
layout();
V();
window.addEventListener('resize', layout);
animate();
</script>
</body>
</html>
